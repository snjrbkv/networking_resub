name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ───────────────────────── Backend ─────────────────────────
  backend:
    name: Backend — install, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test

      - name: Build backend
        run: npm run build

  # ───────────────────────── Frontend ─────────────────────────
  frontend:
    name: Frontend — install, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test --if-present

      - name: Build frontend
        run: npm run build

  # ─────────────────── Docker image build ───────────────────
  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: wholesaleos-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: wholesaleos-frontend:ci
          build-args: |
            VITE_API_URL=http://localhost:4000/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Optional: push to Amazon ECR & roll out to the Auto Scaling Group ───
      # The steps below are intentionally commented out. Enable them once AWS
      # credentials / OIDC role and an ECR repository exist. See docs/DEPLOYMENT.md.
      #
      # - name: Configure AWS credentials (OIDC)
      #   uses: aws-actions/configure-aws-credentials@v4
